{% load i18n %}
<button type="button"
        id="theme-toggle"
        class="btn-ghost shrink-0 p-2"
        aria-label="{% trans 'Toggle color theme' %}"
        title="{% trans 'Toggle light / dark theme' %}">
    <span class="block dark:hidden" aria-hidden="true">
        <svg class="h-5 w-5"
             viewBox="0 0 24 24"
             fill="none"
             stroke="currentColor"
             stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
    </span>
    <span class="hidden dark:block" aria-hidden="true">
        <svg class="h-5 w-5"
             viewBox="0 0 24 24"
             fill="none"
             stroke="currentColor"
             stroke-width="2">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke-linecap="round" />
        </svg>
    </span>
</button>
